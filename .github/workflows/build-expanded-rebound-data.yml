name: Build Expanded Rebound Data
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/build-expanded-rebound-data.yml'
  workflow_dispatch:

concurrency:
  group: expanded-rebound-data-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  superseded:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Superseded by the parallel expanded rebound data workflow."
