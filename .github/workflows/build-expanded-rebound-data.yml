name: Build Expanded Rebound Data
on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/build_additional_22.py'
      - 'tools/patch_expanded_parser.py'
      - '.github/workflows/build-expanded-rebound-data.yml'
  workflow_dispatch:

jobs:
  build-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml
      - run: python tools/patch_expanded_parser.py
      - run: python tools/build_additional_22.py
        env:
          OUT_DIR: expanded_output
          CACHE_DIR: cache_bref
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: expanded-rebound-data
          path: |
            expanded_output/
            cache_bref/
          if-no-files-found: warn
