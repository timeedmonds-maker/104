name: Build career team rebounding on-off database

on:
  push:
    paths:
      - '.github/workflows/career_treb.yml'
      - 'scripts/build_career_treb.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Build database
        run: python scripts/build_career_treb.py
      - name: Commit database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add career_treb_detail.csv career_treb_summary.csv career_treb_metadata.json
          git diff --cached --quiet || git commit -m "Build career team rebounding on-off database"
          git push
