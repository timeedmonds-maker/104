name: Build Expanded Rebound Data Parallel
on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/build_additional_22.py'
      - 'tools/patch_expanded_parser.py'
      - '.github/workflows/build-expanded-rebound-parallel.yml'
  workflow_dispatch:

concurrency:
  group: expanded-rebound-parallel-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  collect-all:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml
      - run: python tools/patch_expanded_parser.py
      - name: Collect all 22 players sequentially
        run: python tools/build_additional_22.py
        env:
          OUT_DIR: merged_output
          CACHE_DIR: cache_bref
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: expanded-rebound-data-parallel
          path: |
            merged_output/
            cache_bref/
          if-no-files-found: warn
