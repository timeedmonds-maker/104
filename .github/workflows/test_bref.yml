name: Test Basketball Reference fetch

on:
  push:
    paths:
      - '.github/workflows/test_bref.yml'
      - 'scripts/test_bref.py'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4 lxml
      - run: python scripts/test_bref.py
      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test_output.json
          git diff --cached --quiet || git commit -m "Add Basketball Reference fetch test result"
          git push
