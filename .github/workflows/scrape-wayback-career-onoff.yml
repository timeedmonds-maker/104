name: Scrape Wayback Career On-Off
on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/scrape_wayback_career_onoff.py'
      - '.github/workflows/scrape-wayback-career-onoff.yml'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml
      - run: python tools/scrape_wayback_career_onoff.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wayback-career-onoff-22
          path: wayback_career_output/
          if-no-files-found: error
