name: Scrape Wayback Missing Seasons
on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/scrape_wayback_missing_seasons.py'
      - '.github/workflows/scrape-wayback-missing-seasons.yml'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml
      - run: python tools/scrape_wayback_missing_seasons.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wayback-missing-seasons
          path: missing_season_output/
          if-no-files-found: error
